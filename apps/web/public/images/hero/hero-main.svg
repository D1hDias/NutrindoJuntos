<svg width="520" height="600" viewBox="0 0 520 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="heroGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#19c5ca;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#6d4d88;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="circleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#19c5ca;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d4d88;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="520" height="600" fill="url(#heroGradient)" rx="16"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="60" fill="url(#circleGradient)" opacity="0.2"/>
  <circle cx="420" cy="500" r="80" fill="url(#circleGradient)" opacity="0.15"/>
  <circle cx="260" cy="300" r="120" fill="url(#circleGradient)" opacity="0.1"/>

  <!-- Person silhouette -->
  <g transform="translate(160, 150)">
    <!-- Head -->
    <circle cx="100" cy="60" r="50" fill="#19c5ca" opacity="0.8"/>

    <!-- Body -->
    <path d="M50 120 Q50 110 60 110 L140 110 Q150 110 150 120 L160 260 Q160 270 150 270 L40 270 Q30 270 30 260 Z"
          fill="#6d4d88" opacity="0.8"/>

    <!-- Arms -->
    <path d="M40 130 Q20 140 25 170 Q30 190 50 180" fill="#19c5ca" opacity="0.7"/>
    <path d="M160 130 Q180 140 175 170 Q170 190 150 180" fill="#19c5ca" opacity="0.7"/>

    <!-- Success gesture - star above -->
    <path d="M100 10 L105 25 L120 30 L105 35 L100 50 L95 35 L80 30 L95 25 Z"
          fill="#f59e0b" opacity="0.9"/>
  </g>

  <!-- Text placeholder -->
  <text x="260" y="550" text-anchor="middle" fill="#4A4A4A" font-family="Arial, sans-serif" font-size="14" opacity="0.5">
    Placeholder - Substitua pela imagem final
  </text>
</svg>
