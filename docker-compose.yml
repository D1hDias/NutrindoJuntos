# Docker Compose - NUTRINDO JUNTOS
# Desenvolvimento local simplificado (apenas Next.js)

version: '3.9'

services:
  # Next.js Application
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
      target: development
    container_name: nutrindo-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      # Brevo API
      BREVO_API_KEY: ${BREVO_API_KEY}
      BREVO_LIST_NEWSLETTER: ${BREVO_LIST_NEWSLETTER}
      BREVO_LIST_LEADS_CURSOS: ${BREVO_LIST_LEADS_CURSOS}
      BREVO_LIST_LEADS_MENTORIA: ${BREVO_LIST_LEADS_MENTORIA}
      BREVO_LIST_CONTATO: ${BREVO_LIST_CONTATO}
      # Analytics
      NEXT_PUBLIC_GA_ID: ${NEXT_PUBLIC_GA_ID}
      # Sentry
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN}
      # Site
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    volumes:
      # Hot reload em desenvolvimento
      - ./apps/web/app:/app/app
      - ./apps/web/components:/app/components
      - ./apps/web/lib:/app/lib
      - ./apps/web/hooks:/app/hooks
      - ./apps/web/types:/app/types
      - ./apps/web/config:/app/config
      - ./apps/web/public:/app/public
      - ./apps/web/package.json:/app/package.json
      - ./apps/web/next.config.mjs:/app/next.config.mjs
      - ./apps/web/tailwind.config.ts:/app/tailwind.config.ts
      - ./apps/web/tsconfig.json:/app/tsconfig.json
      # Evitar sobrescrever node_modules
      - /app/node_modules
      - /app/.next
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  default:
    name: nutrindo-network